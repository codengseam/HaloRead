description: 面向佳能 90D 用户（APS-C 画幅/EF 与 EF-S 卡口）的摄影系统学习专栏。从第一性原理出发，覆盖器材操作、曝光三要素、对焦测光、构图原理、光影运用、色彩管理、人像引导、人像实拍、风光旅游、后期处理、毕业创作、商业变现。新手走到可收费水平，任何环境下都能引导人物拍出好看的人像与风景。
