title: 洛克菲勒：账本A里的帝国
category: 财
author: 编委会
description: 一部写给 AI 时代 OPC（一人公司/超级个体）创业者的硬核商战启示录。以约翰·D·洛克菲勒（John D. Rockefeller, 1839-1937）从底层簿记员到石油帝国建立者的真实人生为骨架，用《三国演义》"七实三虚"的写实度+网文/微短剧的"情绪工程学+注意力控制术"手法，给现代创业者传递"系统思维、效率极致化、逆周期操作"三大降维启发。允许部分夸张和虚构，但年份/金额/人物关系/法律判决等大关节必须真实可考。fiction 桶首发专栏。
