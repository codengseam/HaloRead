title: 系统架构师备考
category: 技
archetype: knowledge
author: 编委会
description: 面向 2026 年 11 月重庆软考高级「系统架构设计师」考试的备考专栏。目标三科一次性全过（综合知识/案例分析/论文各 ≥45 分）。72 章覆盖全部考点、案例分析答题公式、论文万能框架与素材库、考前冲刺模考，含模块 13「中级衔接三专项」17 章（系统集成项目管理工程师 5 章 / 信息安全工程师 6 章 / 网络工程师 6 章），支撑「先中级后高级」备考路径。紧扣官方教材《系统架构设计师教程（第 2 版）》与 2026 命题趋势（云原生、零信任、AIoT、区块链、AIGC）。
cover: 🏛️
sort: 130
