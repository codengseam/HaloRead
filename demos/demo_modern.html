<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豪书斋 · 品牌页头演示</title>
  <style>
    :root {
      --bg: #fff;
      --paper: #faf8f5;
      --ink: #2c2c2c;
      --accent: #8b5a2b;
      --accent-light: #b57d4a;
      --divider: rgba(139, 90, 43, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .showcase {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .stage {
      background: var(--bg);
      border-radius: 20px;
      box-shadow: 0 1px 3px rgba(44, 44, 44, 0.04), 0 12px 40px rgba(44, 44, 44, 0.06);
      overflow: hidden;
      border: 1px solid var(--divider);
    }

    /* Header */
    .brand-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 32px;
      background: var(--bg);
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      border-radius: 10px;
      outline-offset: 4px;
      transition: opacity 0.2s ease;
    }

    .brand-lockup:hover {
      opacity: 0.85;
    }

    .brand-lockup:focus-visible {
      outline: 2px solid var(--accent);
    }

    .brand-badge {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      box-shadow: 0 4px 14px rgba(139, 90, 43, 0.22);
      flex-shrink: 0;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .brand-header:hover .brand-badge {
      transform: translateY(-2px) rotate(-3deg);
      box-shadow: 0 6px 18px rgba(139, 90, 43, 0.28);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.04em;
      line-height: 1.2;
    }

    .brand-motto {
      font-size: 13px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.08em;
      line-height: 1.4;
    }

    .brand-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-link {
      font-size: 14px;
      color: var(--ink);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      opacity: 0.72;
      transition: opacity 0.2s ease, background 0.2s ease;
    }

    .nav-link:hover {
      opacity: 1;
      background: var(--paper);
    }

    .btn-primary {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: var(--ink);
      border: none;
      border-radius: 10px;
      padding: 9px 18px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn-primary:hover {
      background: var(--accent);
      transform: translateY(-1px);
    }

    /* Decorative preview content */
    .preview-body {
      padding: 64px 48px;
      background: var(--paper);
      text-align: center;
    }

    .preview-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }

    .preview-subtitle {
      font-size: 16px;
      color: var(--accent);
      letter-spacing: 0.06em;
      opacity: 0.9;
    }

    .caption {
      text-align: center;
      font-size: 13px;
      color: var(--ink);
      opacity: 0.45;
      letter-spacing: 0.04em;
    }

    @media (max-width: 640px) {
      .brand-header {
        padding: 16px 20px;
      }

      .brand-actions {
        display: none;
      }

      .brand-name {
        font-size: 20px;
      }

      .preview-body {
        padding: 48px 24px;
      }

      .preview-title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="showcase">
    <div class="stage">
      <header class="brand-header">
        <a class="brand-lockup" href="#" title="回到书架">
          <div class="brand-badge" aria-label="豪">豪</div>
          <div class="brand-text">
            <span class="brand-name">豪书斋</span>
            <span class="brand-motto">读古人书，悟今世事</span>
          </div>
        </a>
        <nav class="brand-actions" aria-label="主导航">
          <a class="nav-link" href="#">书架</a>
          <a class="nav-link" href="#">专题</a>
          <a class="nav-link" href="#">关于</a>
          <button class="btn-primary" type="button">开始阅读</button>
        </nav>
      </header>

      <section class="preview-body">
        <h1 class="preview-title">深读一部经典，看见千年人心</h1>
        <p class="preview-subtitle">这里放的是正文区，页头仅占一窄条，视觉重心让给用户内容。</p>
      </section>
    </div>

    <p class="caption">豪书斋 · Modern Badge Header Demo</p>
  </div>
</body>
</html>
