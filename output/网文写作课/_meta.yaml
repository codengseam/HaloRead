title: 网文写作课
category: 写作
# category=写作 不在 archetype_defaults 表，显式声明兜底（参考产品本质课 category=商 同样兜底）
archetype: modern
author: HaloRead 编委会
description: 从第一性原理讲透"网文是什么、爽感从哪来、读者为什么付费"。以麦基《故事》的材质结构、斯奈德《救猫咪》的节拍器、坎贝尔《千面英雄》的英雄之旅、沃格勒《作家之旅》的人物原型为理论底座，融合忘语/辰东/猫腻/爱潜水的乌贼/会说话的肘子等白金作家的作品拆解，落到"番茄免费平台入门完本→起点付费平台万订爆款"的男频双平台进阶路径。讲清网文工业化连载的内核——人物、冲突、爽点、节奏、世界观、持续输出，以及黄金三章、金手指、追更率、完读率、订阅转化、月票争夺等平台特化打法。形式会迭代，但爽感、悬念与读者付费心理的内核一直没变。
cover: ✍️
sort: 123
