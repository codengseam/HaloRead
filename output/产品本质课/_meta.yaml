title: 产品本质课
category: 商
archetype: modern
author: HaloRead 编委会
description: 从第一性原理讲透"产品是什么、如何做好一款产品"。以俞军用户价值公式、克里斯坦森用户任务论（JTBD）、Marty Cagan 产品发现、Don Norman 用户体验、乔布斯/张小龙/迪特拉姆斯/贝索斯产品哲学为主线，覆盖用户价值→用户任务→思维→哲学→发现→设计→增长→组织→避坑全链路。讲清产品本质是"用户价值的载体、问题的解决方案、用户与场景的匹配、商业与用户的公约数"，落到可操作的方法与可避开的坑。形式会过时，但用户价值与产品哲学的内核一直没变。
cover: 🎯
sort: 122
